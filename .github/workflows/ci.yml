# CI gate for atlas-api-index: parse-check src/ and shared/ as ES
# modules, report to #ci-cd via direct curl.
# Deploys go through the reusable deploy-worker caller (see README).

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0, Node 24
        with:
          node-version: "22"

      - name: Parse-check the Worker (ES modules)
        run: |
          for f in src/*.js shared/*.js; do
            echo "checking $f"
            node --input-type=module --check < "$f"
          done

  # CI result reported through the reusable atlas-notify workflow:
  # routes to #ci-cd via signal_class, failures mirror to #alerts.
  notify:
    needs: build
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: AtlasReaper311/atlas-notify/.github/workflows/notify.yml@4485013d9a432d4759ce025fa9bc73aa6a2d9c7f # atlas-notify main: channel routing
    with:
      status: ${{ needs.build.result }}
      kind: ci
      signal_class: cicd
    secrets:
      NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
